version: '3.8'

services:
  # =========================================
  # 1. PostgreSQL For App Data (ORM)
  # =========================================
  postgres:
    image: postgres:15-alpine
    container_name: adk_postgres
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: healthcare_db
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d healthcare_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  # =========================================
  # 2. Milvus Vector Database
  # =========================================
  etcd:
    container_name: milvus-etcd
    image: quay.io/coreos/etcd:v3.5.5
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
      - ETCD_SNAPSHOT_COUNT=50000
    volumes:
      - etcd_data:/etcd
    command: etcd -advertise-client-urls=http://127.0.0.1:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd

  minio:
    container_name: milvus-minio
    image: minio/minio:RELEASE.2023-03-20T20-16-18Z
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    volumes:
      - minio_data:/minio_data
    command: minio server /minio_data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  milvus-standalone:
    container_name: milvus-standalone
    image: milvusdb/milvus:v2.4.0 # Make sure version corresponds to your needs
    command: ["milvus", "run", "standalone"]
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
    volumes:
      - milvus_data:/var/lib/milvus
    ports:
      - "19530:19530" # GPRC Port
      - "9091:9091"   # HTTP Port
    depends_on:
      - "etcd"
      - "minio"

  # =========================================
  # 3. Google ADK Code Run Container
  # =========================================
  api:
    build: .
    container_name: adk_api
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://user:password@postgres:5432/healthcare_db
      - MILVUS_HOST=milvus-standalone
      - MILVUS_PORT=19530
    depends_on:
      postgres:
        condition: service_healthy
      milvus-standalone:
        condition: service_started

volumes:
  pg_data:
  etcd_data:
  minio_data:
  milvus_data:
